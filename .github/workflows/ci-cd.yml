name: CI/CD Pipeline - Smart Market Price Checker

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # TESTING & LINTING
  # ==========================================
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            local_market_price_checker/frontend/package-lock.json
            local_market_price_checker/backend/package-lock.json
      
      - name: Install Frontend Dependencies
        run: cd local_market_price_checker/frontend && npm ci
      
      - name: Install Backend Dependencies
        run: cd local_market_price_checker/backend && npm ci
      
      - name: Lint Frontend
        run: cd local_market_price_checker/frontend && npm run lint --if-present || true
      
      - name: Lint Backend
        run: cd local_market_price_checker/backend && npm run lint --if-present || true
      
      - name: Build Frontend
        run: cd local_market_price_checker/frontend && npm run build
      
      - name: Backend Tests
        run: cd local_market_price_checker/backend && npm test --if-present || true

  # ==========================================
  # SECURITY SCANNING
  # ==========================================
  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Snyk Security Scan
        uses: snyk/actions/node@0.4.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high || true

  # ==========================================
  # BUILD & DEPLOY STAGING
  # ==========================================
  build-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: [test, security]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: local_market_price_checker/frontend/package-lock.json
      
      - name: Build Production Bundle
        run: |
          cd local_market_price_checker/frontend
          npm ci
          npm run build
      
      - name: Deploy to Staging
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️  Deploy hook not configured for staging"
          else
            curl -X POST $RENDER_DEPLOY_HOOK
          fi

  # ==========================================
  # BUILD & DEPLOY PRODUCTION
  # ==========================================
  build-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, security]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: local_market_price_checker/frontend/package-lock.json
      
      - name: Build Production Bundle
        run: |
          cd local_market_price_checker/frontend
          npm ci
          VITE_API_URL=${{ secrets.PROD_API_URL }} npm run build
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist-prod
          path: local_market_price_checker/frontend/dist/
      
      - name: Deploy to Production
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_PROD }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️  Deploy hook not configured for production"
          else
            curl -X POST $RENDER_DEPLOY_HOOK
          fi
      
      - name: Notify Deployment Success
        run: |
          echo "✅ Production deployment completed successfully!"
          echo "Visit: https://smpmps.com"

  # ==========================================
  # PERFORMANCE TESTING
  # ==========================================
  performance:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: local_market_price_checker/frontend/package-lock.json
      
      - name: Install Dependencies
        run: |
          cd local_market_price_checker/frontend
          npm ci
      
      - name: Build Bundle
        run: |
          cd local_market_price_checker/frontend
          npm run build
      
      - name: Report Bundle Size
        run: |
          echo "📦 Bundle size analysis:"
          if [ -f local_market_price_checker/frontend/dist/index.html ]; then
            find local_market_price_checker/frontend/dist -type f -name '*.js' | xargs ls -lh
          fi
      
      - name: Check Bundle Size
        run: |
          echo "Bundle analysis available in artifacts"
