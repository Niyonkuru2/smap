# Cache bust: 2026-04-20 13:40 UTC - Force rebuild for UI updates
services:
  - type: web
    name: smpmps-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install --no-save && npm prune --production
    startCommand: cd backend && npm start
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: market-price-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: market-price-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: market-price-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: market-price-db
          property: password
      - key: DB_NAME
        value: smpmps_db
      - key: EMAIL_FROM
        value: noreply@marketprice.rw
      - key: EMAIL_USER
        value: josianeuwamahoro55@gmail.com
      - key: EMAIL_PASS
        value: skvcsuspncjpwlqa
      - key: SENDGRID_API_KEY
        value: ""  # Leave empty if not using SendGrid, or add your API key
      - key: SMS_ENABLED
        value: "true"

  - type: web
    name: smpmps-frontend
    env: node
    plan: free
    buildCommand: cd frontend && NODE_ENV=development npm install --force && npm run build
    startCommand: cd frontend && npx serve -s dist -l 3000
    # ⚠️ Cache bust: 2026-04-20 13:45 UTC - Force rebuild v3
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=2048

databases:
  - name: market-price-db
    databaseName: smpmps_db
    user: smpmps_db_user
    plan: free
